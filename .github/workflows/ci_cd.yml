# ─────────────────────────────────────────────────────────────────
# EnergyPulse — CI/CD Pipeline
# GitHub Actions workflow
#
# Triggers on:
#   - Push to main branch
#   - Pull request to main branch
#   - Manual trigger (workflow_dispatch)
#   - Weekly schedule (Sunday 3 AM UTC)
#
# Pipeline stages:
#   1. test    → Run pytest suite
#   2. build   → Build Docker image
#   3. train   → Retrain model (schedule or manual only)
#   4. deploy  → Deploy to server (only on main push)
# ─────────────────────────────────────────────────────────────────

name: EnergyPulse CI/CD

# ── Triggers ──────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      retrain:
        description: 'Force model retraining?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
  schedule:
    - cron: "0 3 * * 0"         # Weekly Sunday 3 AM UTC

# ── Permissions ───────────────────────────────────────────────
# packages: write is required to push images to GHCR
permissions:
  contents: read
  packages: write

# ── Environment Variables ──────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: "energypulse"
  DOCKER_REGISTRY: "ghcr.io"

# ─────────────────────────────────────────────────────────────
# JOB 1 — TEST
# ─────────────────────────────────────────────────────────────
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Test API startup
        run: |
          python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
          API_PID=$!
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          kill $API_PID
        env:
          PYTHONPATH: .

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — BUILD DOCKER IMAGE
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        id: image
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — DATA PIPELINE + TRAINING (Weekly or manual)
  # ─────────────────────────────────────────────────────────────
  train:
    name: Data Pipeline & Model Training
    runs-on: ubuntu-latest
    needs: test
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.retrain == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        run: dvc pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

      - name: Fetch fresh data
        run: python -m src.data.fetch
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
          PYTHONPATH: .

      - name: Preprocess data
        run: python -m src.data.preprocess
        env:
          PYTHONPATH: .

      - name: Train model
        run: python -m src.models.train
        env:
          PYTHONPATH: .
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Evaluate model
        run: python -m src.models.evaluate
        env:
          PYTHONPATH: .

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.sha }}
          path: |
            models/
            monitoring/evaluation_report.json
            monitoring/plots/
          retention-days: 30

      - name: Push data versions with DVC
        run: dvc push
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — DEPLOY
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/energypulse
            docker pull ${{ env.DOCKER_REGISTRY }}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/${{ env.DOCKER_IMAGE }}:latest
            docker compose pull api
            docker compose up -d --no-deps api
            sleep 15
            curl -f http://localhost:8000/health || (echo "Deploy failed!" && exit 1)
            echo "Deploy successful! Version: ${{ github.sha }}"

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployed successfully!"
          echo "Version: ${{ github.sha }}"
          echo "Time: $(date)"

      - name: Notify deployment failure
        if: failure()
        run: echo "Deployment failed for ${{ github.sha }}"
