# ─────────────────────────────────────────────────────────────────
# EnergyPulse — CI/CD Pipeline
# GitHub Actions workflow
#
# Triggers on:
#   - Push to main branch
#   - Pull request to main branch
#   - Manual trigger (workflow_dispatch)
#
# Pipeline stages:
#   1. test    → Run pytest suite
#   2. build   → Build Docker image
#   3. train   → Retrain model (only on main push)
#   4. deploy  → Deploy to server (only on main push)
# ─────────────────────────────────────────────────────────────────

name: EnergyPulse CI/CD

# ── Triggers ──────────────────────────────────────────────────
on:
  push:
    branches: [main]          # Run full pipeline on main push
  pull_request:
    branches: [main]          # Run tests only on PRs (no deploy)
  workflow_dispatch:          # Allow manual trigger from GitHub UI
    inputs:
      retrain:
        description: 'Force model retraining?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

# ── Environment Variables ──────────────────────────────────────
# Available to all jobs
env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: "energypulse"
  DOCKER_REGISTRY: "ghcr.io"   # GitHub Container Registry (free)

# ─────────────────────────────────────────────────────────────
# JOB 1 — TEST
# Runs on every push and every pull request
# If tests fail → pipeline stops, no build or deploy
# ─────────────────────────────────────────────────────────────
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest    # Fresh Ubuntu VM on GitHub's servers

    steps:
      # Step 1 — Checkout code
      # Downloads your repo onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Python
      # Installs the exact Python version we want
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'          # Cache pip packages → faster runs

      # Step 3 — Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 — Run tests with coverage report
      - name: Run pytest
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}  # From GitHub Secrets

      # Step 5 — Upload coverage report
      # Visible in GitHub PR as coverage badge
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()           # Upload even if tests partially fail
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      # Step 6 — Test the API starts correctly
      - name: Test API startup
        run: |
          # Start API in background
          python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
          API_PID=$!
          # Wait for it to start
          sleep 10
          # Check health endpoint responds
          curl -f http://localhost:8000/health || exit 1
          # Stop API
          kill $API_PID
        env:
          PYTHONPATH: .

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — BUILD DOCKER IMAGE
  # Runs only after tests pass
  # Builds and pushes image to GitHub Container Registry
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test               # Only runs if 'test' job passes
    # Only build on push to main (not on PRs — no need to build for review)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      # Uses built-in GITHUB_TOKEN — no extra secrets needed
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up Docker Buildx
      # Enables advanced build features (caching, multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push Docker image
      # Tags the image with:
      #   - commit SHA (exact version)
      #   - 'latest' (current)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          # Use GitHub Actions cache to speed up builds
          # Unchanged layers don't get rebuilt
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Save image tag for deploy job
      - name: Output image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
        id: image

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — DATA PIPELINE + TRAINING (Weekly or manual)
  # Fetches fresh data and retrains model
  # Runs on schedule or when manually triggered with retrain=true
  # ─────────────────────────────────────────────────────────────
  train:
    name: Data Pipeline & Model Training
    runs-on: ubuntu-latest
    needs: test
    # Run on: weekly schedule OR manual trigger with retrain=true
    if: |
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.retrain == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # DVC pull — download latest data version
      # DVC tracks data in remote storage (S3, GCS, etc.)
      - name: Pull data with DVC
        run: dvc pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true   # Don't fail if no DVC remote configured

      # Fetch fresh energy data from ENTSO-E
      - name: Fetch fresh data
        run: python -m src.data.fetch
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
          PYTHONPATH: .

      # Run feature engineering
      - name: Preprocess data
        run: python -m src.data.preprocess
        env:
          PYTHONPATH: .

      # Train model + log to MLflow
      - name: Train model
        run: python -m src.models.train
        env:
          PYTHONPATH: .
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      # Generate evaluation plots and report
      - name: Evaluate model
        run: python -m src.models.evaluate
        env:
          PYTHONPATH: .

      # Save model artifacts
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.sha }}
          path: |
            models/
            monitoring/evaluation_report.json
            monitoring/plots/
          retention-days: 30    # Keep artifacts for 30 days

      # DVC push — version the new data and model
      - name: Push data versions with DVC
        run: dvc push
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — DEPLOY
  # Deploys new Docker image to server
  # Runs after build succeeds on main branch
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build              # Only runs after build passes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # Requires manual approval in GitHub UI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Deploy via SSH to your server
      # SSH_PRIVATE_KEY, SERVER_HOST, SERVER_USER set in GitHub Secrets
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/energypulse

            # Pull latest image
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:latest

            # Rolling restart — zero downtime
            # Starts new container before stopping old one
            docker-compose pull api
            docker-compose up -d --no-deps api

            # Verify new container is healthy
            sleep 15
            curl -f http://localhost:8000/health || (echo "Deploy failed!" && exit 1)

            echo "Deploy successful! Version: ${{ github.sha }}"

      # Notify on successful deploy
      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployed successfully!"
          echo "Version: ${{ github.sha }}"
          echo "Time: $(date)"

      # Notify on failed deploy
      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed for ${{ github.sha }}"

# ─────────────────────────────────────────────────────────────
# SCHEDULED RUNS
# Weekly retraining every Sunday at 3 AM
# ─────────────────────────────────────────────────────────────
  scheduled_retrain:
    name: Weekly Scheduled Retrain
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Trigger retraining
        run: echo "Weekly retrain triggered"

# Cron schedule — runs every Sunday at 3:00 AM UTC
# Cron format: minute hour day month weekday
# 0 3 * * 0 = minute:0, hour:3, any day, any month, Sunday(0)
on:
  schedule:
    - cron: "0 3 * * 0"
